<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <style>
        div {
            height:200px;
            width:300px;
            padding:15px 20px ;
            border: solid black;
            margin:15px ;
            background-color:yellow;
            align-content: center;
            text-align: center;
        }
        /*
        padding:20px -->all 4 side
        padding:20px 10px -->top and bottom 20px, left and right -->20px
        padding:20px 10px 5px -->top 20px, left and right 10px, bottom 5px
        padding:20px 10px 5px 15px -->top 20px, right 10px, bottom 5px, left 15px
        */
    </style>
</head>
<body>
    <div><h6>This is div1</h6></div>
    <div><h6>This is div2</h6></div>
</body>
</html>
