<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        img{
            width: 100%;
            height:100%;
            display:block;
        }
        .container{
            width: 200px;
            height:200px;
            border:5px solid burlywood;
            position:relative;
            
        }
        .overlay{
            position: absolute;
            top:0 ;
            bottom:0;
            left:0;
            right:0;
           
            height:100%;
            width:100%;
            opacity: 0;
            transition: 5s ease;
            background-color: aqua;

        }
        .container:hover .overlay{
            opacity: 1;
        }
        h5{
            position:absolute;
            top:25%;
            left:25%;
            color:rgb(211, 17, 17);
            text-align:center;
            font-size:20px;
        }
        .container2{
            width: 200px;
            height:200px;
            border:5px solid burlywood;
            position:relative;
            display:block;
            overflow:hidden;
            
        }
        #id2{
            height:200px;
            width:200px;
        }
    </style>
</head>
<body>
    <div class = "container">
        <img src = "spider.jpeg" alt = "spider">
        <div class = "overlay">
            <h5>Hello Man!</h5>
        </div>
    </div>
    <div class = "container2">
        <img id ="id2"src = "spider.jpeg" alt = "spider">
        
    </div>
    <script>
       // Select the image or container
const img = document.querySelector('#id2');

// Add the zoom on hover
img.onmouseover = function() {
  this.style.transform = "scale(1.1)";
  this.style.transition = "transform 0.5s ease"; // Keeps it smooth
};

// Reset when the mouse leaves
img.onmouseout = function() {
  this.style.transform = "scale(1)";
};
    </script>
</body>
</html>
