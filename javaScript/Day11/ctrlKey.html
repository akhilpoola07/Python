<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Event Object</h1>
    <button>click me</button>
    <script>
        function buyingTickets(eshwar){
            console.dir(eshwar.metaKey);
            if (eshwar.metaKey){
                let h1 = document.querySelector("h1");
                h1.innertext = "Ready for movie"
            }
        }

        let btn = document.querySelector("button");
        console.dir(btn)
        btn.addEventListener("click",buyingTickets);
    </script>
</body>
</html>
