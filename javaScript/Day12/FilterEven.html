<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
      <h1>Filter method</h1>
      <script>
        //.map() — The Transformer
        //Use this when you want to perform the same action on every single item in an array.
        let arr1 = [1,2,3,4,5];
        arr2 = arr1.map((a)=>{
            if (a%2 == 0){
                return true;
            }else{
                return false;
            }
        });
        console.log(arr2)
        //.filter() — The Gatekeeper
        //Use this when you want to "search" through an array and keep only the items that meet a specific criteria.
        //let arr3 = [] use or dont use
        arr3 =arr1.filter((a) => {
            return a%2 == 0;
        });
        console.log(arr3)
      </script>
</body>
</html>
